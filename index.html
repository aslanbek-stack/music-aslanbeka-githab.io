<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Harmony · Музыка для души</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="logo neon-text">Harmony</div>
    <button class="burger-btn" id="burgerBtn" aria-label="Меню">
      <span></span><span></span><span></span>
    </button>
  </header>

  <div class="overlay" id="overlay"></div>

  <div class="app-wrapper">
    <!-- Боковое меню слева -->
    <aside class="sidebar" id="sidebar">
      <nav class="side-nav">
        <a href="#home" class="side-nav-link" data-nav="home">🎵 Главная</a>
        <a href="#favorites" class="side-nav-link" data-nav="favorites">❤️ Избранное</a>
        <a href="#profile" class="side-nav-link" data-nav="profile" style="display:none;">📋 Личный кабинет</a>
        <a href="#admin" class="side-nav-link" data-nav="admin" style="display:none;">🛠️ Админ-панель</a>
        <a href="#login" class="side-nav-link" data-nav="login">🔐 Войти</a>
        <a href="#register" class="side-nav-link" data-nav="register">📝 Регистрация</a>
        <a href="#" class="side-nav-link" id="logoutBtn" style="display:none;">🚪 Выйти</a>
      </nav>
    </aside>

    <main class="main-content" id="mainContent"></main>
  </div>

  <footer class="footer">
    <div class="footer-content">
      <span>© 2025 Harmony. Спокойствие в каждой ноте.</span>
      <div class="footer-links">
        <a href="#">О нас</a>
        <a href="#">Контакты</a>
        <a href="#">Поддержка</a>
      </div>
    </div>
  </footer>

  <div class="audio-player" id="audioPlayer">
    <div class="player-track-info">
      <span class="player-track-title">Не выбрано</span>
      <span class="player-track-artist"></span>
    </div>
    <div class="player-controls">
      <button class="player-btn" id="playerPrevBtn">⏮</button>
      <button class="player-btn player-btn-play" id="playerPlayBtn">▶</button>
      <button class="player-btn" id="playerNextBtn">⏭</button>
    </div>
    <div class="player-progress-container">
      <span class="player-time" id="playerCurrentTime">0:00</span>
      <input type="range" class="player-progress" id="playerProgress" value="0" min="0" max="100" step="0.1">
      <span class="player-time" id="playerDuration">0:00</span>
    </div>
    <div class="player-volume">
      <button class="player-btn" id="playerVolumeBtn">🔊</button>
      <input type="range" class="player-volume-slider" id="playerVolumeSlider" min="0" max="1" step="0.05" value="0.8">
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="app.js"></script>
</body>
</html>
